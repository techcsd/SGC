@if (totalPages() > 1) {
  <nav class="paginator" aria-label="Paginación">
    <span class="paginator__count">{{ desde() }}–{{ hasta() }} de {{ total() }}</span>

    <div class="paginator__controls">
      <button
        type="button"
        class="paginator__btn"
        (click)="prev()"
        [disabled]="page() === 1"
        aria-label="Página anterior"
      >
        ‹ Anterior
      </button>

      <span class="paginator__page">Página {{ page() }} de {{ totalPages() }}</span>

      <button
        type="button"
        class="paginator__btn"
        (click)="next()"
        [disabled]="page() === totalPages()"
        aria-label="Página siguiente"
      >
        Siguiente ›
      </button>
    </div>
  </nav>
}
