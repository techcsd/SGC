@if (visible()) {
  <div class="tour" role="dialog" aria-modal="true" aria-labelledby="tour-title">
    <!-- Dim + spotlight -->
    @if (rect(); as r) {
      <div class="tour__spot" [style]="spotStyle()"></div>
    } @else {
      <div class="tour__dim"></div>
    }

    <!-- Callout -->
    <div
      class="tour__pop"
      [class.tour__pop--center]="!rect()"
      [style]="rect() ? popStyle() : null"
    >
      <button type="button" class="tour__skip" (click)="skip()">Saltar</button>

      @if (current().icon; as ic) {
        <div class="tour__icon">{{ ic }}</div>
      }
      <h2 class="tour__title" id="tour-title">{{ current().title }}</h2>
      <p class="tour__text">{{ current().text }}</p>

      <div class="tour__dots">
        @for (s of steps; track $index) {
          <span class="tour__dot" [class.tour__dot--on]="$index === index()"></span>
        }
      </div>

      <div class="tour__actions">
        @if (index() > 0) {
          <button type="button" class="tour__btn tour__btn--ghost" (click)="prev()">Atrás</button>
        }
        <button type="button" class="tour__btn tour__btn--primary" (click)="next()">
          {{ isLast() ? 'Empezar' : 'Siguiente' }}
        </button>
      </div>
    </div>
  </div>
}
