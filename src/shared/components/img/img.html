<div
  class="app-img"
  [class.app-img--rounded]="rounded()"
  [class.app-img--loaded]="loaded()"
  [style]="boxStyle()"
>
  @if (!loaded()) {
    <span class="app-img__ph" aria-hidden="true"></span>
  }
  @if (src() && !errored()) {
    <img
      class="app-img__el"
      [src]="src()"
      [alt]="alt()"
      loading="lazy"
      decoding="async"
      [style.object-fit]="fit()"
      (load)="onLoad()"
      (error)="onError()"
    />
  } @else if (errored() || !src()) {
    <span class="app-img__fallback" aria-hidden="true">{{ fallback() }}</span>
  }
</div>
