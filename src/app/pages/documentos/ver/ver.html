<div class="ver-toolbar no-print">
  <a routerLink="/documentos/historial" class="sgc-btn sgc-btn--ghost">← Volver al historial</a>
  @if (documento()) {
    <button type="button" class="sgc-btn sgc-btn--primary" (click)="imprimir()">Imprimir / Guardar PDF</button>
    @if (revisionLegal(); as rev) {
      <span class="sgc-badge" [class.sgc-badge--warning]="rev.estado === 'pendiente'" [class.sgc-badge--success]="rev.estado === 'aprobado'" [class.sgc-badge--danger]="rev.estado === 'rechazado'">
        {{ estadoRevisionLabel(rev.estado) }}
      </span>
    } @else {
      <button type="button" class="sgc-btn sgc-btn--secondary" [disabled]="solicitandoRevision()" (click)="solicitarRevisionLegal()">
        @if (solicitandoRevision()) {
          Enviando…
        } @else {
          Solicitar revisión legal
        }
      </button>
    }
  }
</div>
@if (revisionError()) {
  <p class="no-print ver-error">{{ revisionError() }}</p>
}

@if (loading()) {
  <p class="no-print">Cargando…</p>
} @else if (error()) {
  <p class="no-print ver-error">{{ error() }}</p>
} @else if (documento(); as doc) {
  <div class="documento-final" [innerHTML]="contenidoSafe()"></div>
}
